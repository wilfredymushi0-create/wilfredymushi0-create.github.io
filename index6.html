<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right, #fff8f0, #ffe9d6);
    color:#333;
    padding:30px;
}


h1{
    text-align:center;
    margin-bottom:30px;
}

h1 img{
    width:320px;
    max-width:100%;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.4s;
}

h1 img:hover{
    transform:scale(1.05);
}


figure{
    background:white;
    max-width:800px;
    margin:auto;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
    text-align:center;
}

figure img{
    width:100%;
    max-width:700px;
    border-radius:18px;
    transition:0.4s;
}

figure img:hover{
    transform:scale(1.03);
}

figcaption{
    margin-top:15px;
    font-size:18px;
    color:#666;
    line-height:1.6;
}


h4{
    text-align:center;
    margin:50px 0 25px;
    font-size:28px;
    color:#d35400;
}


.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:0.4s ease;
    cursor:pointer;
}

.gallery img:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
}


body::after{
    content:"Made with Love 🍰";
    display:block;
    text-align:center;
    margin-top:50px;
    font-size:18px;
    color:#888;
}
</style>
</head>
